<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="mark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Mark: stacked page/portal icon -->
  <rect x="8" y="10" width="28" height="36" rx="4" fill="url(#mark-grad)" opacity="0.2"/>
  <rect x="13" y="6" width="28" height="36" rx="4" fill="url(#mark-grad)" opacity="0.5"/>
  <rect x="18" y="2" width="28" height="36" rx="4" fill="url(#mark-grad)"/>
  <!-- Lines suggesting content -->
  <rect x="24" y="10" width="16" height="2.5" rx="1.25" fill="#fff" opacity="0.9"/>
  <rect x="24" y="16" width="12" height="2" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="24" y="21" width="14" height="2" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="24" y="26" width="10" height="2" rx="1" fill="#fff" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="56" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#1a1a2e">folio</text>
</svg>
